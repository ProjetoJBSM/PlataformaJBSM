name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: firebase
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve app directory
        run: |
          if [[ -f package.json ]] && [[ -d src ]]; then
            echo "APP_DIR=." >> "$GITHUB_ENV"
          elif [[ -f jbsm-platform/package.json ]]; then
            echo "APP_DIR=jbsm-platform" >> "$GITHUB_ENV"
          else
            echo "Nao foi possivel localizar o app Vue para build."
            exit 1
          fi

      - name: Install
        run: npm ci
        working-directory: ${{ env.APP_DIR }}

      - name: Build
        run: npm run build
        working-directory: ${{ env.APP_DIR }}
        env:
          VITE_BASE_PATH: /PlataformaJBSM/
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Create SPA fallback
        run: cp "${APP_DIR}/dist/index.html" "${APP_DIR}/dist/404.html"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.APP_DIR }}/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4